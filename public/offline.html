<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Hakerek</title>
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; align-items: center; justify-content: center;
            background: #0f172a; color: #e2e8f0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            text-align: center; padding: 24px;
        }
        .card { max-width: 360px; }
        img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 20px; }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
        button {
            background: #3b82f6; color: #fff; border: none; cursor: pointer;
            padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/icons/icon-192.png" alt="" />
        <h1>You're offline</h1>
        <p>Hakerek needs a connection to reach your assistant. Check your network and try again.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
